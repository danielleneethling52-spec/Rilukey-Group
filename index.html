<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rilukey Group | Elite Stay Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;700&display=swap');
        :root { --brand-purple: #5b21b6; --brand-orange: #f97316; --brand-teal: #0d9488; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #070708; color: #fff; overflow-x: hidden; }
        h1, h2, h3, .logo-text { font-family: 'Syncopate', sans-serif; }
        
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .room-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.05); }
        .room-card.selected { border-color: var(--brand-orange); background: rgba(249, 115, 22, 0.1); transform: scale(1.02); }
        .room-card.selected .check-icon { display: block; }
        
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        .premium-btn { background: linear-gradient(90deg, var(--brand-orange), #ea580c); box-shadow: 0 10px 20px rgba(234, 88, 12, 0.2); }
    </style>
</head>
<body>

    <section class="relative h-[60vh] w-full flex items-center justify-center overflow-hidden">
        <img src="https://images.unsplash.com/photo-1564013799919-ab600027ffc6?auto=format&fit=crop&w=1920&q=80" class="absolute inset-0 w-full h-full object-cover opacity-30">
        <div class="relative z-10 text-center px-6">
            <h1 class="text-4xl md:text-6xl font-black uppercase tracking-tighter mb-8">Rilukey Group <br> <span class="text-orange-400">Curated Stays</span></h1>
            
            <div class="glass-card p-6 rounded-[2rem] max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="text-left">
                    <label class="text-[9px] font-bold text-gray-500 uppercase ml-2">Travel Dates</label>
                    <div class="flex gap-2 mt-1">
                        <input type="date" id="checkIn" class="w-full bg-white/5 p-3 rounded-xl text-[10px]" onchange="updateTotalDisplay()">
                        <input type="date" id="checkOut" class="w-full bg-white/5 p-3 rounded-xl text-[10px]" onchange="updateTotalDisplay()">
                    </div>
                </div>
                <div class="text-left">
                    <label class="text-[9px] font-bold text-gray-500 uppercase ml-2">Total Guests</label>
                    <input type="number" id="guestCount" value="2" min="1" class="w-full bg-white/5 p-3 rounded-xl text-xs font-bold mt-1" onchange="updateTotalDisplay()">
                </div>
                <div class="flex items-end">
                    <button onclick="document.getElementById('grid').scrollIntoView({behavior:'smooth'})" class="w-full py-4 premium-btn rounded-xl font-black uppercase text-[10px] tracking-widest">Explore Collection</button>
                </div>
            </div>
        </div>
    </section>

    <div id="grid" class="max-w-7xl mx-auto py-20 px-10 grid grid-cols-1 md:grid-cols-3 gap-8"></div>

    <div id="modal" class="fixed inset-0 z-[100] hidden bg-black/95 backdrop-blur-xl flex items-center justify-center p-4">
        <div class="bg-[#0c0c0e] w-full max-w-6xl rounded-[3rem] overflow-hidden flex flex-col md:flex-row relative max-h-[90vh] border border-white/5">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-white z-50"><i class="fa fa-times text-2xl"></i></button>

            <div class="md:w-1/2 relative bg-black">
                <img id="mImg" src="" class="w-full h-full object-cover opacity-60">
                <div class="absolute bottom-10 left-10 right-10">
                    <h2 id="mTitle" class="text-3xl font-black uppercase mb-2"></h2>
                    <p id="mArea" class="text-orange-400 text-[10px] font-black uppercase tracking-widest mb-6"></p>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white/5 p-4 rounded-2xl backdrop-blur">
                            <p class="text-[8px] text-gray-500 font-bold uppercase mb-1">AI Rating</p>
                            <p class="text-xl font-black text-teal-400" id="mRating"></p>
                        </div>
                        <div class="bg-white/5 p-4 rounded-2xl backdrop-blur text-right">
                            <p class="text-[8px] text-gray-500 font-bold uppercase mb-1">Nights</p>
                            <p class="text-xl font-black" id="mNightCount">0</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="md:w-1/2 p-8 md:p-12 overflow-y-auto">
                <h4 class="text-[10px] font-bold text-gray-500 uppercase mb-6 tracking-widest">1. Select Your Space</h4>
                <div id="roomOptions" class="space-y-4 mb-10"></div>

                <div class="bg-white/5 p-6 rounded-3xl border border-white/10 mb-8">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs text-gray-400">Stay Total (<span id="calcNights">0</span> nights)</span>
                        <span class="text-xs font-bold" id="breakdownBase">R0</span>
                    </div>
                    <div class="flex justify-between items-center mb-4 pb-4 border-b border-white/5">
                        <span class="text-xs text-gray-400">Service Fee & Taxes</span>
                        <span class="text-xs font-bold">Included</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-sm font-black uppercase">Grand Total</span>
                        <span class="text-2xl font-black text-orange-400" id="grandTotal">R0</span>
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" placeholder="Full Name" class="w-full bg-white/5 p-4 rounded-xl text-xs outline-none border border-white/10 focus:border-orange-500">
                        <input type="email" placeholder="Email Address" class="w-full bg-white/5 p-4 rounded-xl text-xs outline-none border border-white/10 focus:border-orange-500">
                    </div>
                    <button onclick="submitRequest()" class="w-full py-5 premium-btn rounded-2xl font-black uppercase text-xs tracking-widest transition-all">Submit Secure Request</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const data = [
            { 
                id: 1, name: "Horizon One", area: "Clifton", rating: "9.9",
                img: "https://images.unsplash.com/photo-1613490493576-7fde63acd811?auto=format&fit=crop&w=1200&q=80",
                rooms: [
                    { name: "Ocean Front Suite", price: 35000, capacity: 2 },
                    { name: "Family Villa Wing", price: 65000, capacity: 6 }
                ]
            },
            { 
                id: 2, name: "La Provence", area: "Franschhoek", rating: "9.6",
                img: "https://images.unsplash.com/photo-1505843513577-22bb7d21ef45?auto=format&fit=crop&w=1200&q=80",
                rooms: [
                    { name: "Vineyard Cottage", price: 12500, capacity: 2 },
                    { name: "Manor House", price: 28000, capacity: 8 }
                ]
            }
        ];

        let selectedRoomPrice = 0;
        let currentProperty = null;

        // Render Property Cards
        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = data.map(p => `
                <div class="glass-card rounded-[2.5rem] overflow-hidden group cursor-pointer" onclick="openModal(${p.id})">
                    <img src="${p.img}" class="h-64 w-full object-cover group-hover:scale-105 transition duration-700">
                    <div class="p-8">
                        <p class="text-[9px] font-bold text-orange-400 uppercase tracking-widest">${p.area}</p>
                        <h3 class="text-xl font-bold uppercase mt-1">${p.name}</h3>
                        <p class="text-[10px] text-gray-500 mt-4">Starting from R${p.rooms[0].price.toLocaleString()}</p>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id) {
            currentProperty = data.find(x => x.id === id);
            document.getElementById('mImg').src = currentProperty.img;
            document.getElementById('mTitle').innerText = currentProperty.name;
            document.getElementById('mArea').innerText = currentProperty.area;
            document.getElementById('mRating').innerText = currentProperty.rating;
            
            // Generate Room Options
            const options = currentProperty.rooms.map((r, index) => `
                <div id="room-${index}" class="room-card p-5 rounded-2xl flex justify-between items-center cursor-pointer" onclick="selectRoom(${index}, ${r.price})">
                    <div>
                        <div class="font-bold text-xs uppercase">${r.name}</div>
                        <div class="text-[9px] text-gray-500">MAX ${r.capacity} GUESTS</div>
                    </div>
                    <div class="text-right">
                        <div class="text-sm font-black text-white">R${r.price.toLocaleString()}</div>
                        <div class="text-[8px] text-gray-500 uppercase">Per Night</div>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('roomOptions').innerHTML = options;
            updateTotalDisplay();

            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        function selectRoom(index, price) {
            // Remove previous selection
            document.querySelectorAll('.room-card').forEach(c => c.classList.remove('selected'));
            // Add new selection
            document.getElementById(`room-${index}`).classList.add('selected');
            selectedRoomPrice = price;
            updateTotalDisplay();
        }

        function updateTotalDisplay() {
            const cin = new Date(document.getElementById('checkIn').value);
            const cout = new Date(document.getElementById('checkOut').value);
            
            let nights = 0;
            if(cin && cout && cout > cin) {
                const diff = cout.getTime() - cin.getTime();
                nights = Math.ceil(diff / (1000 * 3600 * 24));
            }

            document.getElementById('mNightCount').innerText = nights;
            document.getElementById('calcNights').innerText = nights;
            
            const total = selectedRoomPrice * nights;
            document.getElementById('breakdownBase').innerText = `R${(selectedRoomPrice * nights).toLocaleString()}`;
            document.getElementById('grandTotal').innerText = `R${total.toLocaleString()}`;
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
            selectedRoomPrice = 0;
        }

        function submitRequest() {
            if(selectedRoomPrice === 0) {
                alert("Please select a room first.");
                return;
            }
            alert("Rilukey Group Inquiry Sent! Total Estimated Stay: " + document.getElementById('grandTotal').innerText);
            closeModal();
        }

        // Set default dates to today and tomorrow
        const today = new Date();
        const tomorrow = new Date(today);
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('checkIn').value = today.toISOString().split('T')[0];
        document.getElementById('checkOut').value = tomorrow.toISOString().split('T')[0];

        render();
    </script>
</body>
</html>
