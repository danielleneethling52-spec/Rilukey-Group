<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rilukey Group | Curated Stays</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;700&display=swap');
        :root { --brand-purple: #5b21b6; --brand-orange: #f97316; --brand-teal: #0d9488; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0a0a0c; color: #fff; overflow-x: hidden; }
        h1, h2, .logo-text { font-family: 'Syncopate', sans-serif; }
        .premium-gradient { background: linear-gradient(135deg, var(--brand-purple) 0%, var(--brand-teal) 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        
        .room-card { border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; cursor: pointer; border-radius: 1.25rem; padding: 1.25rem; background: rgba(255,255,255,0.02); }
        .room-card.selected { border-color: var(--brand-orange); background: rgba(249, 115, 22, 0.1); }
        .room-card.disabled { opacity: 0.4; cursor: not-allowed; }
        
        input, select { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.05); color: white; padding: 0.75rem; border-radius: 0.75rem; width: 100%; }
        .info-label { font-size: 0.65rem; font-weight: 900; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 0.25rem; }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 px-6 md:px-12 py-6 flex justify-between items-center bg-black/60 backdrop-blur-xl border-b border-white/5">
        <div class="flex items-center space-x-4">
            <div class="w-10 h-10 rounded-lg premium-gradient flex items-center justify-center font-bold text-xl shadow-lg">R</div>
            <span class="logo-text text-lg tracking-tighter font-bold uppercase hidden md:block">Rilukey Group</span>
        </div>
        <div class="flex gap-8 items-center">
            <a href="#listings" class="text-[10px] font-bold uppercase tracking-widest hover:text-orange-400 transition">Portfolios</a>
            <a href="mailto:stay@rilukey.com" class="bg-white/10 hover:bg-orange-500 px-6 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest transition-all">Contact Us</a>
        </div>
    </nav>

    <section id="home" class="relative min-h-[80vh] w-full flex items-center justify-center pt-24 pb-12">
        <img src="https://images.unsplash.com/photo-1613490493576-7fde63acd811?auto=format&fit=crop&w=1920&q=80" class="absolute inset-0 w-full h-full object-cover opacity-40">
        <div class="relative z-10 text-center px-6 w-full max-w-7xl">
            <h1 class="text-4xl md:text-6xl font-black uppercase mb-12 tracking-tighter" data-aos="fade-up">Curated Stays For Every Traveler</h1>
            
            <div class="glass-card p-4 rounded-3xl md:rounded-full grid grid-cols-1 md:grid-cols-5 gap-2 shadow-2xl items-center" data-aos="zoom-in">
                <div class="px-4 text-left">
                    <label class="info-label text-orange-400">Destination</label>
                    <select id="heroArea" class="bg-transparent border-none p-0 text-sm font-bold uppercase cursor-pointer">
                        <option value="all" class="bg-zinc-900">All Portfolios</option>
                        <option value="clifton" class="bg-zinc-900">Clifton</option>
                        <option value="franschhoek" class="bg-zinc-900">Franschhoek</option>
                    </select>
                </div>
                <div class="px-4 text-left md:border-l border-white/10">
                    <label class="info-label text-orange-400">Check In</label>
                    <input type="date" id="heroCheckIn" class="bg-transparent border-none p-0 text-sm font-bold cursor-pointer" onchange="syncDates()">
                </div>
                <div class="px-4 text-left md:border-l border-white/10">
                    <label class="info-label text-orange-400">Check Out</label>
                    <input type="date" id="heroCheckOut" class="bg-transparent border-none p-0 text-sm font-bold cursor-pointer" onchange="syncDates()">
                </div>
                <div class="px-4 text-left md:border-l border-white/10 flex gap-4">
                    <div class="w-1/2"><label class="info-label text-orange-400">Adults</label><input type="number" id="heroAdults" value="2" class="bg-transparent border-none p-0 text-sm font-bold"></div>
                    <div class="w-1/2"><label class="info-label text-orange-400">Children</label><input type="number" id="heroKids" value="0" class="bg-transparent border-none p-0 text-sm font-bold"></div>
                </div>
                <button onclick="executeFilter()" class="bg-orange-500 hover:bg-orange-600 text-white font-black h-14 md:h-full rounded-2xl md:rounded-full uppercase text-xs tracking-widest transition-all">Check Availability</button>
            </div>
        </div>
    </section>

    <section id="listings" class="py-24 px-6 md:px-12 max-w-7xl mx-auto">
        <div id="listingGrid" class="grid grid-cols-1 md:grid-cols-2 gap-10"></div>
    </section>

    <div id="modal" class="fixed inset-0 z-[100] hidden bg-black/95 backdrop-blur-xl flex items-center justify-center p-4">
        <div class="bg-[#0a0a0c] w-full max-w-6xl rounded-[3rem] overflow-hidden flex flex-col md:flex-row relative max-h-[92vh] border border-white/10">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-white z-50"><i class="fa fa-times text-2xl"></i></button>
            <div class="md:w-5/12 h-64 md:h-auto"><img id="mImg" src="" class="w-full h-full object-cover"></div>
            <div class="p-8 md:p-12 md:w-7/12 overflow-y-auto">
                <h2 id="mTitle" class="text-3xl font-black uppercase mb-2"></h2>
                <div id="mSpecs" class="flex gap-4 text-[10px] font-bold uppercase text-orange-400 mb-8 pb-4 border-b border-white/5"></div>
                
                <div class="grid grid-cols-2 gap-8 mb-8">
                    <div><span class="info-label text-teal-500 mb-2">AI Vibe</span><div id="mAiDetails" class="space-y-2"></div></div>
                    <div><span class="info-label text-teal-500 mb-2">Nearby</span><div id="mAttractions" class="space-y-1 text-[11px] text-gray-400"></div></div>
                </div>

                <div class="mb-8">
                    <span class="info-label mb-3">Step 1: Select Your Suite</span>
                    <div id="roomOptions" class="grid gap-3"></div>
                </div>

                <div class="glass-card p-6 rounded-2xl border border-white/10">
                    <h3 class="text-[10px] font-bold uppercase mb-4 text-orange-400">Step 2: Guest Details</h3>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div class="space-y-1"><label class="info-label">Check In</label><input type="date" id="mCheckIn" onchange="syncFromModal()"></div>
                        <div class="space-y-1"><label class="info-label">Check Out</label><input type="date" id="mCheckOut" onchange="syncFromModal()"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <input type="text" id="bName" placeholder="Full Name">
                        <input type="email" id="bEmail" placeholder="Email Address">
                    </div>
                    <div class="flex justify-between items-center bg-white/5 p-5 rounded-xl border border-white/10">
                        <span id="mTotal" class="text-3xl font-black text-white">R0</span>
                        <button onclick="alert('Inquiry Sent!')" class="bg-orange-500 hover:bg-orange-600 px-10 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest shadow-xl">Confirm Inquiry</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-zinc-900/50 border-t border-white/5 py-16 px-12 text-center md:text-left">
        <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-12">
            <div><span class="logo-text text-lg font-bold uppercase">Rilukey Group</span><p class="text-gray-500 text-sm mt-4">Private self-catering luxury.</p></div>
            <div><h4 class="text-orange-400 font-bold uppercase text-[10px] tracking-widest mb-4">Contact</h4><p class="text-sm">stay@rilukey.com<br>+27 (0) 21 123 4567</p></div>
            <div><h4 class="text-orange-400 font-bold uppercase text-[10px] tracking-widest mb-4">Locations</h4><p class="text-sm">Clifton, Cape Town<br>Franschhoek, Cape Winelands</p></div>
        </div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        const data = [
            { 
                id: 1, name: "Horizon One", area: "clifton",
                img: "https://images.unsplash.com/photo-1613490493576-7fde63acd811?auto=format&fit=crop&w=1200&q=80",
                beds: 4, baths: 4, maxGuests: 8,
                rules: [{l: "Vibe Score", v: "9.9 AI Elite"}, {l: "Check-In", v: "14:00 PM"}],
                attractions: ["Clifton 4th Beach", "Camps Bay Strip"],
                rooms: [{name: "Full Villa", price: 85000, capacity: 8, features: "4 Bedrooms, Private Pool"}]
            },
            { 
                id: 2, name: "La Provence", area: "franschhoek",
                img: "https://images.unsplash.com/photo-1505843513577-22bb7d21ef45?auto=format&fit=crop&w=1200&q=80",
                beds: 2, baths: 2, maxGuests: 4,
                rules: [{l: "Heritage Score", v: "9.5 AI Luxury"}, {l: "Check-In", v: "15:00 PM"}],
                attractions: ["Wine Tram Terminal", "Huguenot Memorial"],
                rooms: [{name: "The Manor House", price: 28000, capacity: 4, features: "2 Bedrooms, Estate View"}]
            }
        ];

        let selectedPrice = 0;
        let activeProp = null;

        function render(items) {
            document.getElementById('listingGrid').innerHTML = items.map(p => `
                <div class="glass-card rounded-[2.5rem] overflow-hidden border border-white/5 flex flex-col h-full" data-aos="fade-up">
                    <img src="${p.img}" class="h-72 w-full object-cover">
                    <div class="p-8 flex-grow flex flex-col">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="text-xl font-bold uppercase">${p.name}</h3>
                            <div class="text-right"><p class="text-[10px] text-gray-500 uppercase font-black">From</p><p class="text-xl font-black">R${p.rooms[0].price.toLocaleString()}</p></div>
                        </div>
                        <div class="flex gap-6 mb-8 py-4 border-y border-white/5">
                            <div class="flex items-center gap-2"><i class="fa fa-bed text-orange-500 text-xs"></i><span class="text-xs font-bold">${p.beds} <span class="font-normal text-gray-500">Beds</span></span></div>
                            <div class="flex items-center gap-2"><i class="fa fa-users text-orange-500 text-xs"></i><span class="text-xs font-bold">${p.maxGuests} <span class="font-normal text-gray-500">Guests</span></span></div>
                        </div>
                        <button onclick="openModal(${p.id})" class="mt-auto w-full bg-white/5 hover:bg-orange-500 border border-white/10 py-4 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">View Property Details</button>
                    </div>
                </div>
            `).join('');
        }

        function syncDates() {
            document.getElementById('mCheckIn').value = document.getElementById('heroCheckIn').value;
            document.getElementById('mCheckOut').value = document.getElementById('heroCheckOut').value;
            calculateTotal();
        }

        function syncFromModal() {
            document.getElementById('heroCheckIn').value = document.getElementById('mCheckIn').value;
            document.getElementById('heroCheckOut').value = document.getElementById('mCheckOut').value;
            calculateTotal();
        }

        function openModal(id) {
            activeProp = data.find(x => x.id === id);
            document.getElementById('mTitle').innerText = activeProp.name;
            document.getElementById('mImg').src = activeProp.img;
            document.getElementById('mSpecs').innerHTML = `${activeProp.beds} Beds | ${activeProp.baths} Baths | Max ${activeProp.maxGuests} Guests`;
            document.getElementById('mAiDetails').innerHTML = activeProp.rules.map(r => `<div><span class="text-[8px] font-black text-gray-600 uppercase">${r.l}</span><p class="text-xs font-bold">${r.v}</p></div>`).join('');
            document.getElementById('mAttractions').innerHTML = activeProp.attractions.map(a => `<p>• ${a}</p>`).join('');
            
            document.getElementById('roomOptions').innerHTML = activeProp.rooms.map((r, i) => `
                <div class="room-card" id="rc-${i}" onclick="setRoom(${r.price}, 'rc-${i}')">
                    <div class="flex justify-between items-center">
                        <div><p class="font-bold text-xs uppercase">${r.name}</p><p class="text-[9px] text-gray-500 uppercase">${r.features}</p></div>
                        <p class="text-lg font-black italic">R${r.price.toLocaleString()}</p>
                    </div>
                </div>
            `).join('');

            syncDates(); // Populate modal dates from hero on open
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        function setRoom(price, id) {
            selectedPrice = price;
            document.querySelectorAll('.room-card').forEach(e => e.classList.remove('selected'));
            document.getElementById(id).classList.add('selected');
            calculateTotal();
        }

        function calculateTotal() {
            const cin = new Date(document.getElementById('mCheckIn').value);
            const cout = new Date(document.getElementById('mCheckOut').value);
            if(cin && cout && cout > cin && selectedPrice > 0) {
                const nights = (cout - cin) / 86400000;
                document.getElementById('mTotal').innerText = "R" + (nights * selectedPrice).toLocaleString();
            } else document.getElementById('mTotal').innerText = "R0";
        }

        function executeFilter() {
            const area = document.getElementById('heroArea').value;
            render(data.filter(p => (area === 'all' || p.area === area)));
            document.getElementById('listings').scrollIntoView({ behavior: 'smooth' });
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); document.body.style.overflow = 'auto'; }
        
        render(data);
    </script>
</body>
</html>
